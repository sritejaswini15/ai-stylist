services:
  - type: web
    name: fitme-backend
    plan: free
    region: oregon
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: fitme-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: BACKEND_CORS_ORIGINS
        value: '["*"]'
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_ALT
        sync: false
      - key: CHATBOT_GEMINI_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_TOKEN_ALT
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: REMOVE_BG_API_KEY
        sync: false

databases:
  - name: fitme-db
    plan: free
    region: oregon
